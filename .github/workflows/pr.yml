name: Pull Request Tests

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        working-directory: ./app
        run: |
          python -m pip install --upgrade pip
          pip install flit pytest
          flit install --deps develop
          
      - name: Run Tests
        working-directory: ./app
        env:
          SECRET_KEY: test-key
        run: |
          pytest tests/ -v

  automerge:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Automatically merge the PR
        env:
          # A Personal Access Token (PAT) must be used here so that the resulting merge
          # triggers the deploy.yml workflow. Default GITHUB_TOKEN prevents workflow recursion.
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --merge

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#ff0000'
          SLACK_MESSAGE: 'Pull Request tests failed :x:'
          SLACK_TITLE: PR Build Failure
